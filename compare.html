<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparativo | MG Digital</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: #0b0b0b;
        color: #ffffff;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .compare-shell {
        display: grid;
        height: 100%;
        grid-template-rows: auto 1fr;
      }

      .compare-header {
        display: flex;
        min-height: 64px;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: #111111;
      }

      .compare-header h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.2;
      }

      .compare-header a {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 999px;
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
        text-transform: uppercase;
      }

      .compare-grid {
        display: grid;
        min-height: 0;
        grid-template-columns: 1fr 1fr;
      }

      .compare-pane {
        display: grid;
        min-width: 0;
        min-height: 0;
        grid-template-rows: auto 1fr;
        border-right: 1px solid rgba(255, 255, 255, 0.12);
      }

      .compare-pane:last-child {
        border-right: 0;
      }

      .compare-label {
        display: flex;
        min-height: 44px;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 16px;
        background: #000000;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .compare-label span {
        color: #eb2968;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
        }

        .compare-shell {
          min-height: 100%;
          height: auto;
        }

        .compare-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .compare-grid {
          grid-template-columns: 1fr;
        }

        .compare-pane {
          height: 86vh;
          border-right: 0;
          border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }
      }
    </style>
  </head>
  <body>
    <main class="compare-shell">
      <header class="compare-header">
        <h1>Comparativo da LP MG Digital</h1>
        <div>
          <a href="/original.html" target="_blank" rel="noreferrer">Abrir original</a>
          <a href="/" target="_blank" rel="noreferrer">Abrir atual</a>
        </div>
      </header>
      <section class="compare-grid" aria-label="Comparação lado a lado">
        <article class="compare-pane">
          <div class="compare-label">Versão <span>Original</span></div>
          <iframe title="LP original" src="/original.html"></iframe>
        </article>
        <article class="compare-pane">
          <div class="compare-label">Versão <span>Atualizada</span></div>
          <iframe title="LP atualizada" src="/"></iframe>
        </article>
      </section>
    </main>
  </body>
</html>
